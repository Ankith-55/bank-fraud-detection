<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        body{
            padding:0;
            background-color: #f4f4f4;
        }

        .container{
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header{
            text-align: center;
            padding-bottom: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .content{
            padding: 20px 0;
        }

        .footer{
            text-align: center;
            padding-top: 20px 0;
            border-top: 1px solid #eee;
            font-size: 0.8em;
            color: #666;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% block header %}{% endblock %}</h1>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            {% block footer %}
            <p>If you have any questions please contact us <a href="mailto:{{support_email}}">{{support_email}}</a>.</p>
            
            <p>
                Thanks for your service! &copy; {{site_name}} Team. All rights reserved.
            </p>
            {% endblock %}
        </div>

</body>
</html>
